version: 2.1

orbs:
  node: circleci/node@1.1.6

jobs:
  build-and-test:
    executor:
      name: node/default
    resource_class: small
    steps:
      - checkout
      - node/with-cache:
          steps:
            - run: npm install
            - run: npm test

  cypress-test:
    executor:
      name: cypress/base-10
    resource_class: small
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ .Branch }}-{{ checksum "package.json" }}
      - run:
          name: Install packages
          command: npm install
      - run:
          name: Start server
          command: npm run start
          background: true
      - run:
          name: Run cypress tests
          command: npm run cy:run
      - save_cache:
          key: v1-deps-{{ .Branch }}-{{ checksum "package.json" }}
          paths:
            - ~/.npm
            - ~/.cache

workflows:
    build-and-test:
      jobs:
        - cypress-test
